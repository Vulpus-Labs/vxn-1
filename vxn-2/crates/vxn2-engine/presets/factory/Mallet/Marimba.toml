schema = 1

[meta]
name = "Marimba"
author = "Vulpus Labs"
category = "Mallet"
comment = "Translated from DX7 ROM1A 'MARIMBA': algo 7, no feedback. Two woody carriers (ratio 0.5) plus fast-decaying modulators at ratios 3/5/0.75 and a near-instant op6 ping (R1=0). Percussive EGs copied 1:1; KS break at MIDI 75 rolls the modulators off up top."

[params]
algo = 7
feedback = 0.0

# op1 — carrier, ratio 0.5, woody body.
op1-num = 1
op1-denom = 2
op1-level = 95
op1-vel-sens = 0
op1-ks-rate = 3
op1-ks-r-depth = 0
op1-eg-r1 = 95
op1-eg-r2 = 40
op1-eg-r3 = 49
op1-eg-r4 = 55
op1-eg-l1 = 99
op1-eg-l2 = 92
op1-eg-l3 = 0
op1-eg-l4 = 0

# op2 -> op1, ratio 3.0, fast attack tone, rolls off above MIDI 75.
op2-num = 3
op2-level = 96
op2-vel-sens = 2
op2-ks-rate = 0
op2-ks-break-pt = 75
op2-ks-r-depth = 46
op2-eg-r1 = 99
op2-eg-r2 = 72
op2-eg-r3 = 0
op2-eg-r4 = 0
op2-eg-l1 = 82
op2-eg-l2 = 48
op2-eg-l3 = 0
op2-eg-l4 = 0

# op3 — carrier, ratio 0.5.
