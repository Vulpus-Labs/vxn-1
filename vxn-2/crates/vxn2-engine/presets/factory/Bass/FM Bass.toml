schema = 1

[meta]
name = "FM Bass"
author = "Vulpus Labs"
category = "Bass"
comment = "Translated from DX7 ROM1A 'BASS 1': algo 16, max op-tree feedback. DX7 transpose -12 st baked into the ratios (all x0.5) since vxn-2 has no global semitone transpose. KS rate-scaling (rs 5-7) preserved so the attack tightens up the keyboard. Best played mono."

[params]
algo = 16
feedback = 4.9

# op1 — the single carrier (ratio 0.5 -> 0.25 after octave-down).
op1-num = 1
op1-denom = 4
op1-level = 99
op1-vel-sens = 0
op1-ks-rate = 7
op1-ks-break-pt = 57
op1-ks-l-depth = 57
op1-ks-r-depth = 14
op1-eg-r1 = 95
op1-eg-r2 = 62
op1-eg-r3 = 17
op1-eg-r4 = 58
op1-eg-l1 = 99
op1-eg-l2 = 95
op1-eg-l3 = 32
op1-eg-l4 = 0

# op2 (ratio 0.25) — fast modulator, click on the attack.
op2-num = 1
op2-denom = 4
op2-level = 80
op2-vel-sens = 0
op2-ks-rate = 7
op2-ks-r-depth = 0
op2-eg-r1 = 99
op2-eg-r2 = 20
op2-eg-r3 = 0
op2-eg-r4 = 0
op2-eg-l1 = 99
op2-eg-l2 = 0
op2-eg-l3 = 0
op2-eg-l4 = 0

# op3 (ratio 0.25).
op3-num = 1
op3-denom = 4
op3-level = 99
op3-vel-sens = 3
op3-ks-rate = 6
op3-ks-r-depth = 0
op3-eg-r1 = 88
op3-eg-r2 = 96
op3-eg-r3 = 32
op3-eg-r4 = 30
op3-eg-l1 = 79
op3-eg-l2 = 65
op3-eg-l3 = 0
op3-eg-l4 = 0

# op4 (ratio 5.0 -> 2.5) — bright upper harmonic, velocity-opened.
op4-num = 5
op4-denom = 2
op4-level = 93
op4-vel-sens = 5
op4-ks-rate = 5
op4-ks-r-depth = 0
op4-eg-r1 = 90
op4-eg-r2 = 42
op4-eg-r3 = 7
op4-eg-r4 = 55
op4-eg-l1 = 90
op4-eg-l2 = 30
op4-eg-l3 = 0
op4-eg-l4 = 0

# op5 (ratio 0.25).
op5-num = 1
op5-denom = 4
op5-level = 62
op5-vel-sens = 3
op5-ks-rate = 7
op5-ks-break-pt = 73
op5-ks-l-depth = 75
op5-ks-r-depth = 0
op5-eg-r1 = 99
op5-eg-r2 = 0
op5-eg-r3 = 0
op5-eg-r4 = 0
op5-eg-l1 = 99
op5-eg-l2 = 0
op5-eg-l3 = 0
op5-eg-l4 = 0

# op6 (ratio 9.0 -> 4.5) — top modulator, hard velocity (kvs 7) for grit.
op6-num = 9
op6-denom = 2
op6-level = 85
op6-vel-sens = 7
op6-ks-rate = 1
op6-ks-r-depth = 0
op6-eg-r1 = 94
op6-eg-r2 = 56
op6-eg-r3 = 24
op6-eg-r4 = 55
op6-eg-l1 = 93
op6-eg-l2 = 28
op6-eg-l3 = 0
op6-eg-l4 = 0

# Mono bass, short glide. Single dry voice.
assign-mode = "Solo"
glide-time = 30.0
stack-density = 1
delay-on = false
reverb-on = false
master-volume = -2.03
