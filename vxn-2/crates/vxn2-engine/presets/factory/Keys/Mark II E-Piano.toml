schema = 1

[meta]
name = "Mark II E-Piano"
author = "Vulpus Labs"
category = "Keys"
comment = "DX7 ROM1A E.PIANO-1 tine electric piano: algo 5, op6 feedback, velocity-driven tine bite. Modulator levels restored to the real DX7 voice (op2 tine=58, op4=89, op6=79) now that the engine uses the DX7 log level curve. Light reverb, dry delay."

# Algo 5 (three 2-op stacks: 2->1, 4->3, 6->5) is the descriptor default, so
# it is omitted. feedback rides op6 (the algo's structural FB op).
[params]
feedback = 2.5

# Op 1 — carrier (pair A body).
op1-detune = 2
op1-vel-sens = 2
op1-eg-r1 = 96
op1-eg-r2 = 25
op1-eg-r3 = 25
op1-eg-r4 = 67
# Body decay knee. Was 35 under the old square curve (~-18 dB); the log curve
# (ADR 0007) made 35 ~-48 dB, collapsing the body to a marimba-like ping. 75 is
# the real DX7 E.PIANO-1 op1 L2 and restores the ~-18 dB knee under the log curve.
op1-eg-l2 = 75
op1-eg-l3 = 0
op1-ks-r-depth = 0
op1-ks-rate = 3

# Op 2 — tine modulator -> Op 1; ratio 14, hard velocity. Real DX7 tine level.
op2-num = 14
op2-level = 58
op2-vel-sens = 7
op2-eg-r1 = 95
op2-eg-r4 = 78
op2-eg-l2 = 35
op2-eg-l3 = 0
op2-ks-r-depth = 0
op2-ks-rate = 3

# Op 3 — carrier (pair B body).
op3-vel-sens = 2
op3-eg-r1 = 95
op3-eg-r2 = 20
op3-eg-r3 = 20
op3-eg-r4 = 50
# Knee was 83 under the square curve (~-3 dB); 95 restores it under the log curve.
op3-eg-l2 = 95
op3-eg-l3 = 0
op3-ks-r-depth = 0
op3-ks-rate = 3

# Op 4 — modulator -> Op 3. Real DX7 level.
op4-level = 89
op4-vel-sens = 6
op4-eg-r1 = 95
op4-eg-r2 = 29
op4-eg-r3 = 20
op4-eg-r4 = 50
op4-eg-l2 = 83
op4-eg-l3 = 0
op4-ks-r-depth = 0
op4-ks-rate = 3

# Op 5 — carrier (pair C body), detuned against Op 1 for chorusing.
op5-detune = -5
op5-vel-sens = 0
op5-eg-r1 = 95
op5-eg-r2 = 20
op5-eg-r3 = 20
op5-eg-r4 = 50
# Knee was 83 under the square curve (~-3 dB); 95 restores it under the log curve.
op5-eg-l2 = 95
op5-eg-l3 = 0
op5-ks-r-depth = 0
op5-ks-rate = 3

# Op 6 — modulator -> Op 5, carries the feedback loop; fades above D4. Real DX7 level.
op6-detune = 5
op6-level = 79
op6-vel-sens = 6
op6-eg-r1 = 95
op6-eg-r2 = 29
op6-eg-r3 = 20
op6-eg-r4 = 50
op6-eg-l2 = 83
op6-eg-l3 = 0
op6-ks-break-pt = 62
op6-ks-r-depth = 19
op6-ks-rate = 3

# Per-voice LFO + pitch EG (DX7 voice settings).
lfo2-shape = "Sine"
lfo2-rate = 5.6
# Delay + fade so the stereo tremolo (slots 6/7) swells in after the attack
# transient rather than chopping the note from the start.
lfo2-delay = 400.0
lfo2-fade = 650.0
peg-r1 = 94
peg-r2 = 67
peg-r3 = 95
peg-r4 = 60

# Single dry voice like the hardware; no glide.
glide-time = 0.0
stack-density = 1

# Gain-match to the bank: 3 carriers at OL 99 (loudness est 3.0) →
# -3 - 20*log10(3) ≈ -12.5 dB, the converter's formula. Needed now that the
# L2 fix lets all three carrier bodies sustain near full instead of collapsing.
master-volume = -12.5

# Touch of room. Delay bypassed.
reverb-size = 0.4
reverb-mix = 0.14
delay-on = false

# Mod matrix: the standard E.PIANO routings. Slot 0 (vibrato) and slot 2
# (extra tine bite) ship at depth 0 — wired, ready to dial in.
[[matrix]]
slot = 0
source = "lfo2"
dest = "global-pitch"
curve = "lin"
depth = 0.0

[[matrix]]
slot = 1
source = "voice-rand"
dest = "lfo2-phase"
curve = "lin"
depth = 1.0

[[matrix]]
slot = 2
source = "velocity"
dest = "op2-level"
curve = "exp"
depth = 0.0

[[matrix]]
slot = 3
source = "mod-wheel"
dest = "lfo1-rate"
curve = "lin"
depth = 0.6

[[matrix]]
slot = 4
source = "voice-spread"
dest = "op1-pan"
curve = "lin"
depth = 1.0

[[matrix]]
slot = 5
source = "voice-spread"
dest = "op3-pan"
curve = "lin"
depth = 1.0

# Stereo tremolo: lfo2 pans carrier pair A (op1) and pair C (op5) in antiphase,
# so the tail sways left/right — the classic Rhodes "vibrato". Pair B (op3) is
# left unmodulated to anchor the centre. lfo2-delay/fade ramp it in post-attack.
[[matrix]]
slot = 6
source = "lfo2"
dest = "op1-pan"
curve = "lin"
depth = 0.35

[[matrix]]
slot = 7
source = "lfo2"
dest = "op5-pan"
curve = "lin"
depth = -0.35
