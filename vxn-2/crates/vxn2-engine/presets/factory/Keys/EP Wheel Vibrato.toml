schema = 1

[meta]
name = "EP Wheel Vibrato"
author = "Vulpus Labs"
category = "Keys"
comment = "E.PIANO 1 with mod-wheel-controlled vibrato (E033 demo): LFO1 -> global pitch, scaled by the mod wheel. Wheel down = no vibrato; wheel up = vibrato in. The DX7 mod-wheel-vibrato the additive-only matrix couldn't express."

[params]
algo = 5
feedback = 4.2

# op1
op1-num = 1
op1-detune = 2
op1-level = 99
op1-vel-sens = 2
op1-eg-r1 = 96
op1-eg-r2 = 25
op1-eg-r3 = 25
op1-eg-r4 = 67
op1-eg-l1 = 99
op1-eg-l2 = 75
op1-eg-l3 = 0
op1-eg-l4 = 0
op1-ks-rate = 3
op1-ks-l-depth = 0
op1-ks-r-depth = 0

# op2
op2-num = 14
op2-level = 58
op2-vel-sens = 7
op2-eg-r1 = 95
op2-eg-r2 = 50
op2-eg-r3 = 35
op2-eg-r4 = 78
op2-eg-l1 = 99
op2-eg-l2 = 75
op2-eg-l3 = 0
op2-eg-l4 = 0
op2-ks-rate = 3
op2-ks-l-depth = 0
op2-ks-r-depth = 0

# op3
op3-num = 1
op3-level = 99
op3-vel-sens = 2
op3-eg-r1 = 95
op3-eg-r2 = 20
op3-eg-r3 = 20
op3-eg-r4 = 50
op3-eg-l1 = 99
op3-eg-l2 = 95
op3-eg-l3 = 0
op3-eg-l4 = 0
op3-ks-rate = 3
op3-ks-l-depth = 0
op3-ks-r-depth = 0

# op4
op4-num = 1
op4-level = 89
op4-vel-sens = 6
op4-eg-r1 = 95
op4-eg-r2 = 29
op4-eg-r3 = 20
op4-eg-r4 = 50
op4-eg-l1 = 99
op4-eg-l2 = 95
op4-eg-l3 = 0
op4-eg-l4 = 0
op4-ks-rate = 3
op4-ks-l-depth = 0
op4-ks-r-depth = 0

# op5
op5-num = 1
op5-detune = -5
op5-level = 99
op5-vel-sens = 0
op5-eg-r1 = 95
op5-eg-r2 = 20
op5-eg-r3 = 20
op5-eg-r4 = 50
op5-eg-l1 = 99
op5-eg-l2 = 95
op5-eg-l3 = 0
op5-eg-l4 = 0
op5-ks-rate = 3
op5-ks-l-depth = 0
op5-ks-r-depth = 0

# op6
op6-num = 1
op6-detune = 5
op6-level = 79
op6-vel-sens = 6
op6-eg-r1 = 95
op6-eg-r2 = 29
op6-eg-r3 = 20
op6-eg-r4 = 50
op6-eg-l1 = 99
op6-eg-l2 = 95
op6-eg-l3 = 0
op6-eg-l4 = 0
op6-ks-rate = 3
op6-ks-break-pt = 62
op6-ks-l-depth = 0
op6-ks-r-depth = 19
op6-ks-r-curve = "neg-lin"

# LFO1 is the vibrato oscillator — a ~5.5 Hz sine. It only reaches pitch
# through the matrix slot below, whose depth is gated by the mod wheel.
lfo1-shape = "Sine"
lfo1-rate = 5.5

stack-density = 1
delay-on = false
reverb-on = false
master-volume = -17.04

# E033 demo route: LFO1 -> global pitch, scaled by the mod wheel.
#   wheel = 0   -> scale 0   -> no pitch modulation (dead-flat EP)
#   wheel = 1   -> scale 1   -> full depth (~0.65 st peak vibrato)
# depth 0.3 with the pitch dest's cubic taper (24 * 0.3^3) ≈ 0.65 semitones.
[[matrix]]
slot = 0
source = "lfo1"
dest = "global-pitch"
depth = 0.3
scale-src = "mod-wheel"
