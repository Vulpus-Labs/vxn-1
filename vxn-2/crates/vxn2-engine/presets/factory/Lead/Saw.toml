schema = 1

[meta]
name = "Saw"
author = "Vulpus Labs"
category = "Lead"
comment = "Analytic supersaw. Algo 32 (six parallel carriers) summed into a bandlimited saw: ratios 1-6 at ~1/sqrt(n) levels (tilted brighter than textbook 1/n to fight the midrange honk), even harmonics phase-flipped (0.5 = π) so the time-domain shape is saw-like. The FUNDAMENTAL (ratio 1) sits on op6, the algo-32 FB op, so feedback ladders the full integer series (1, 2, 3, 4...) above the six-partial ceiling — neutral brightening, no pitch bias. Eight detuned + phase-decorrelated stack lanes fatten it. The 0073 Nyquist fade keeps upward sweeps alias-clean."

[params]
algo = 32
# op6 is the algo-32 structural FB op. Ratio 1 (the fundamental) is parked there
# so feedback ladders the COMPLETE harmonic series (1,2,3,4,5...) — brightens
# neutrally with no fifth/octave emphasis. Cost: it's the loudest carrier, so FB
# buzz is most audible and heavy FB can smear pitch. Tune by ear.
feedback = 2.5

# Six carriers, harmonic ratios 1..6 at ~1/sqrt(n). Op->ratio NOT slot-ordered:
# the fundamental moves to op6 (the FB op); the 6th harmonic takes op1's vacated
# slot. Even harmonics (2, 6) carry phase 0.5 = π so the sum stays saw-like.
op1-num = 6
op1-level = 40
op1-phase = 0.5
op1-eg-l2 = 99
op1-eg-l3 = 99

op2-num = 2
op2-level = 70
op2-phase = 0.5
op2-eg-l2 = 99
op2-eg-l3 = 99

op3-num = 3
op3-level = 57
op3-eg-l2 = 99
op3-eg-l3 = 99

op4-num = 4
op4-level = 50
op4-phase = 0.5
op4-eg-l2 = 99
op4-eg-l3 = 99

op5-num = 5
op5-level = 44
op5-eg-l2 = 99
op5-eg-l3 = 99

op6-num = 1
op6-level = 99
op6-eg-l2 = 99
op6-eg-l3 = 99

# Supersaw: eight decorrelated lanes. Detune + per-lane phase scatter give width.
stack-density = 8
stack-detune = 18.0
stack-spread = 0.80
stack-phase = 0.70

# A little space so the width reads.
reverb-size = 0.5
reverb-mix = 0.20

# Carrier-count comp (1/sqrt 6) now level-matches algo 32 in the engine, so the
# old manual -6 for "six carriers run hot" is redundant. Back to the -6 default.
# Limiter stays on for safety.
master-volume = -12.34
limiter-on = true

# Lane spread -> per-carrier pan for stereo width.
[[matrix]]
slot = 0
source = "voice-spread"
dest = "op1-pan"
curve = "lin"
depth = 1.0

[[matrix]]
slot = 1
source = "voice-spread"
dest = "op3-pan"
curve = "lin"
depth = -1.0

[[matrix]]
slot = 2
source = "voice-spread"
dest = "op5-pan"
curve = "lin"
depth = 1.0
