# DX7 source-voice capture (reference only — NOT a vxn-2 preset).
#
# Five Yamaha DX7 factory ROM voices, decoded from the original SysEx cartridge
# dumps and captured verbatim in DX7 units. Used as the source material for the
# five hand-translated vxn-2 factory presets (see presets/factory/{Bell,Bass,
# Organ,Keys,Mallet}/). This file lives OUTSIDE presets/factory/ on purpose so
# the include_dir!() factory bank never tries to parse it as a preset.
#
# Source banks (Yamaha Black Boxes archive, original cartridge dumps):
#   ROM1A  https://yamahablackboxes.com/patches/dx7/factory/rom1a.syx
#   (ROM2A/ROM1B also fetched; final picks are all ROM1A.)
# Decoded with a SysEx unpacker per the VCED 155-byte voice spec
#   (D. Benson DX7 sysex-format.txt; asb2m10/dexed sysex-format.txt).
#
# DX7 units (as stored on the instrument):
#   eg_r / eg_l        : 4 envelope rates + 4 levels, 0-99 each
#   out                : operator output level, 0-99
#   coarse / fine      : ratio = (coarse==0 ? 0.5 : coarse) * (1 + fine/100)
#   fixed_hz           : fixed-mode frequency = 10^((coarse & 3) + fine/100)
#   detune             : 0-14, 7 = centre (so the value below is already det-7)
#   kvs                : key velocity sensitivity, 0-7
#   rs                 : keyboard rate scaling, 0-7
#   brk / ld / rd      : KS break point (0-99 note offset) + left/right depth (0-99)
#   lc / rc            : KS left/right curve, 0=-lin 1=-exp 2=+exp 3=+lin
#   algo               : 1-32   feedback : 0-7
#   peg_*              : pitch EG (rates 0-99, levels 0-99 where 50 = no shift)
#   lfo_*              : pmd/amd = 0 in all five (no audible LFO modulation)

# ──────────────────────────────────────────────────────────────────────────
[["TUB BELLS"]]          # ROM1A #25 — inharmonic tubular bell
algo = 5
feedback = 7
[["TUB BELLS".ops]]      # op1
out = 95; coarse = 1; fine = 0; detune = 2;  eg_r = [95,33,71,25]; eg_l = [99,0,32,0]; kvs = 0; rs = 2
[["TUB BELLS".ops]]      # op2
out = 78; coarse = 2; fine = 75; detune = 3; eg_r = [98,12,71,28]; eg_l = [99,0,32,0]; kvs = 0; rs = 2  # ratio 3.50
[["TUB BELLS".ops]]      # op3
out = 99; coarse = 1; fine = 0; detune = -5; eg_r = [95,33,71,25]; eg_l = [99,0,32,0]; kvs = 0; rs = 2
[["TUB BELLS".ops]]      # op4
out = 75; coarse = 2; fine = 75; detune = -2; eg_r = [98,12,71,28]; eg_l = [99,0,32,0]; kvs = 0; rs = 2 # ratio 3.50
[["TUB BELLS".ops]]      # op5 — FIXED 323.6 Hz, strike transient
out = 99; mode = "fixed"; fixed_hz = 323.6; detune = 0; eg_r = [76,78,71,70]; eg_l = [99,0,0,0]; kvs = 5; rs = 2
[["TUB BELLS".ops]]      # op6
out = 85; coarse = 2; fine = 0; detune = -7; eg_r = [98,91,0,28]; eg_l = [99,0,0,0]; kvs = 0; rs = 2

