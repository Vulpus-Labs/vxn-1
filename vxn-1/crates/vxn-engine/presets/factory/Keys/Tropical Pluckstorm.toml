schema = 1

[meta]
name = "Tropical Pluckstorm"
author = "Vulpus Labs"
category = "Keys"
comment = "Bright sweeping pluck — downward pitch-env chirp on attack, snappy filter, rhythmic delay and ambient reverb. No chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
delay_on = true
delay_time = 0.28
delay_feedback = 0.5
delay_mix = 0.3
reverb_on = true
reverb_size = 0.55
reverb_decay = 2.8
reverb_damp = 0.45
reverb_mix = 0.22

[performance.upper]
osc1_level = 0.75
osc2_octave = 0
osc2_fine = 5.0
osc2_level = 0.55
cutoff = 4000.0
resonance = 0.3
pitch_env_src = "Env 1"
pitch_env_depth = -7.0
env1_attack = 0.001
env1_decay = 0.18
cutoff_env_depth = 30.0
env2_attack = 0.002
env2_decay = 0.4
env2_sustain = 0.0
env2_release = 0.25
