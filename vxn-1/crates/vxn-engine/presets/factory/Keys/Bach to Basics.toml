schema = 1

[meta]
name = "Bach to Basics"
author = "Vulpus Labs"
category = "Keys"
comment = "Harpsichord pluck — bright narrow-pulse pair, fast decay, slight detune for the dual-string jangle. Small room reverb."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
reverb_on = true
reverb_size = 0.35
reverb_decay = 1.4
reverb_damp = 0.45
reverb_mix = 0.18

[performance.upper]
osc1_wave = "Pulse"
osc1_pw = 0.2
osc2_wave = "Pulse"
osc2_octave = 0
osc2_pw = 0.25
osc2_fine = 4.0
cutoff = 3200.0
resonance = 0.2
env1_decay = 0.15
cutoff_env_depth = 30.0
env2_attack = 0.002
env2_decay = 0.55
env2_sustain = 0.0
env2_release = 0.2
