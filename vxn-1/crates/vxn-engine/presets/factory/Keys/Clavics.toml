schema = 1

[meta]
name = "Clavics"
author = "Vulpus Labs"
category = "Keys"
comment = "Clavinet — narrow pulse, key-tracked filter, velocity opens the cutoff, classic phaser pairing."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
phaser_on = true
phaser_rate = 0.8
phaser_depth = 0.7
phaser_fb = 0.5
phaser_mix = 0.5

[performance.upper]
osc1_wave = "Pulse"
osc1_pw = 0.25
osc2_octave = 0
osc2_level = 0.3
cutoff = 110.0
resonance = 0.35
drive = 1.4
filter_key_track = 1.0
hpf_cutoff = 180.0
env1_decay = 0.22
cutoff_env_depth = 42.0
env2_attack = 0.002
env2_decay = 0.45
env2_sustain = 0.0
env2_release = 0.15
vel_cutoff_depth = 36.0
