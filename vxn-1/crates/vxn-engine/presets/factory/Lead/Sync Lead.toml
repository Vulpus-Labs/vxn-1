schema = 1

[meta]
name = "Sync Lead"
author = "Vulpus Labs"
category = "Lead"
comment = "Screaming hard-sync lead — Twin assign across two detuned channels, Env 1 drives the sync sweep, subtle chorus widens. 4x oversample for clean sync."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
oversample = "4x"
chorus_rate = 0.5
chorus_depth = 0.4
chorus_mix = 0.3

[performance.upper]
osc1_coarse = 7
osc1_octave = 0
osc1_level = 0.6
osc2_level = 0.9
cross_mod_type = "Sync"
pitch_env_src = "Env 1"
pitch_env_depth = 12.0
pitch_env_mod_only = true
cutoff = 6000.0
resonance = 0.3
drive = 2.0
env1_attack = 0.01
env1_decay = 0.7
env1_sustain = 0.3
env2_attack = 0.01
env2_decay = 0.3
env2_release = 0.2
assign_mode = "Twin"
unison_detune = 8.0
pitch_wheel_depth = 7.0
