schema = 1

[meta]
name = "Mark Will Sync Us"
author = "Vulpus Labs"
category = "Lead"
comment = "Surging negative-envelope sync lead — sharp attack, sync sweep diving downward via an inverted pitch-env. Slap delay gives the rhythmic edge. 4x oversample for clean sync."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
oversample = "4x"
delay_on = true
delay_time = 0.18
delay_feedback = 0.35
delay_mix = 0.28

[performance.upper]
osc1_coarse = 5
osc1_octave = 0
osc1_level = 0.85
cross_mod_type = "Sync"
pitch_env_src = "Env 1"
pitch_env_depth = -12.0
pitch_env_mod_only = true
env1_attack = 0.001
env1_decay = 0.25
cutoff = 5500.0
resonance = 0.25
drive = 1.5
env2_attack = 0.002
env2_decay = 0.4
env2_sustain = 0.7
env2_release = 0.2
assign_mode = "Solo"
legato = true
