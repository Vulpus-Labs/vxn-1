schema = 1

[meta]
name = "Sync Hole"
author = "Vulpus Labs"
category = "Lead"
comment = "Bright metallic sync lead with a long sustained sweep into reverb space. Twin assign fattens each note. 4x oversample for clean sync."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
oversample = "4x"
reverb_on = true
reverb_size = 0.6
reverb_decay = 4.0
reverb_damp = 0.4
reverb_mix = 0.28

[performance.upper]
osc1_coarse = 7
osc1_octave = 0
osc1_level = 0.85
cross_mod_type = "Sync"
pitch_env_src = "Env 1"
pitch_env_depth = 12.0
pitch_env_mod_only = true
cutoff = 6500.0
resonance = 0.3
drive = 1.6
env1_attack = 0.01
env1_decay = 0.7
env1_sustain = 0.3
env2_attack = 0.01
env2_decay = 0.3
env2_sustain = 0.8
env2_release = 0.5
assign_mode = "Twin"
unison_detune = 8.0
pitch_wheel_depth = 7.0
mod_wheel_cross_mod_sweep = 24.0
