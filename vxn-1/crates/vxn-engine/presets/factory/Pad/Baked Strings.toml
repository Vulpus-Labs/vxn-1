schema = 1

[meta]
name = "Baked Strings"
author = "Vulpus Labs"
category = "Pad"
comment = "Lush unison string-machine pad — eight detuned voices, slow bow swell, gentle vibrato, drift, chorus and hall reverb."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
master_drift = 0.2
chorus_rate = 0.55
chorus_depth = 0.7
chorus_mix = 0.5
reverb_on = true
reverb_size = 0.6
reverb_decay = 3.0
reverb_damp = 0.4
reverb_mix = 0.3

[performance.upper]
osc1_level = 0.8
osc2_octave = 0
osc2_fine = 8.0
osc2_level = 0.8
cutoff = 3000.0
resonance = 0.15
filter_key_track = 0.4
env1_attack = 0.5
env1_decay = 1.0
env1_sustain = 0.5
env1_release = 1.0
cutoff_env_depth = 16.0
env2_attack = 0.6
env2_decay = 1.8
env2_sustain = 0.85
env2_release = 1.3
assign_mode = "Unison"
unison_detune = 18.0
pitch_lfo_depth = 0.18
lfo_rate = 4.5
lfo1_free_run = true
cutoff_lfo2_depth = 12.0
