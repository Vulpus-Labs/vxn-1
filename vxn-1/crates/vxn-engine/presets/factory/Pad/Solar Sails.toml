schema = 1

[meta]
name = "Solar Sails"
author = "Vulpus Labs"
category = "Pad"
comment = "Airy drifting wind pad — pink noise over soft saws, per-voice LFO 1 drifts the cutoff, long delay and big space behind. No chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
master_drift = 0.4
chorus_on = false
delay_on = true
delay_time = 0.6
delay_feedback = 0.6
delay_mix = 0.3
reverb_on = true
reverb_size = 0.8
reverb_decay = 6.0
reverb_damp = 0.5
reverb_mix = 0.4

[performance.upper]
osc1_level = 0.55
osc2_octave = 0
osc2_fine = 7.0
osc2_level = 0.45
noise_level = 0.25
noise_color = "Pink"
cutoff = 1600.0
resonance = 0.4
lfo_shape = "Tri"
lfo_rate = 0.25
lfo1_free_run = true
cutoff_lfo1_depth = 36.0
env1_attack = 1.5
env1_decay = 2.5
env1_sustain = 0.6
env1_release = 2.5
env2_attack = 1.5
env2_decay = 2.5
env2_sustain = 0.75
env2_release = 3.0
