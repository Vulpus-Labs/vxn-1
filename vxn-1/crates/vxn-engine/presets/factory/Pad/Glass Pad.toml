schema = 1

[meta]
name = "Glass Pad"
author = "Vulpus Labs"
category = "Pad"
comment = "Evolving sync pad through a bandpass — Env 1 drags a slow sync sweep, a whisper of pink noise, long reverb tail. No chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
reverb_on = true
reverb_size = 0.7
reverb_decay = 5.0
reverb_damp = 0.35
reverb_mix = 0.35

[performance.upper]
osc1_level = 0.6
osc2_wave = "Pulse"
osc2_octave = 0
osc2_pw = 0.35
osc2_level = 0.85
cross_mod_type = "Sync"
noise_level = 0.08
noise_color = "Pink"
filter_mode = "BP"
cutoff = 5000.0
resonance = 0.25
filter_key_track = 0.3
env1_attack = 0.8
env1_decay = 2.5
env1_release = 2.0
cutoff_env_depth = 18.0
env2_attack = 0.5
env2_decay = 1.5
env2_sustain = 0.7
env2_release = 1.6
pitch_env_src = "Env 1"
pitch_env_depth = 12.0
pitch_env_mod_only = true
