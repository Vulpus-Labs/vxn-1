schema = 1

[meta]
name = "Clean Sweep"
author = "Vulpus Labs"
category = "Pad"
comment = "Slow phaser sweep is the gesture — saw + pulse pad with PWM motion under LFO 2, big hall behind. No chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
lfo2_shape = "Tri"
lfo2_rate = 0.2
phaser_on = true
phaser_rate = 0.15
phaser_depth = 0.8
phaser_fb = 0.5
phaser_mix = 0.6
reverb_on = true
reverb_size = 0.65
reverb_decay = 3.5
reverb_damp = 0.45
reverb_mix = 0.28

[performance.upper]
osc1_level = 0.7
osc2_wave = "Pulse"
osc2_octave = 0
osc2_fine = 5.0
osc2_pw = 0.4
osc2_level = 0.65
cutoff = 1800.0
resonance = 0.35
env1_attack = 0.8
env1_decay = 1.5
env1_sustain = 0.6
env1_release = 1.2
cutoff_env_depth = 20.0
env2_attack = 0.8
env2_decay = 1.5
env2_sustain = 0.85
env2_release = 1.5
pwm_lfo_src = "LFO 2"
pwm_lfo_depth = 0.18
cutoff_lfo2_depth = 18.0
