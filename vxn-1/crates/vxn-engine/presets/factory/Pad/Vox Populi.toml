schema = 1

[meta]
name = "Vox Populi"
author = "Vulpus Labs"
category = "Pad"
comment = "Synthetic choir aah — pulse pair through bandpass for vowel formant, slow swell, breath of vibrato, chorus and medium hall."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_rate = 0.75
chorus_depth = 0.65
chorus_mix = 0.5
reverb_on = true
reverb_size = 0.6
reverb_decay = 3.5
reverb_damp = 0.4
reverb_mix = 0.3

[performance.upper]
osc1_wave = "Pulse"
osc1_pw = 0.3
osc1_level = 0.7
osc2_wave = "Pulse"
osc2_octave = 0
osc2_pw = 0.4
osc2_fine = 6.0
osc2_level = 0.7
filter_mode = "BP"
cutoff = 1200.0
resonance = 0.4
env1_attack = 0.8
env1_decay = 1.5
env1_sustain = 0.6
env1_release = 1.3
cutoff_env_depth = 18.0
env2_attack = 0.5
env2_decay = 1.5
env2_sustain = 0.85
env2_release = 1.2
pitch_lfo_depth = 0.18
lfo_rate = 3.5
lfo1_free_run = true
