schema = 1

[meta]
name = "Pedal Pusher"
author = "Vulpus Labs"
category = "Bass"
comment = "Held organ-pedal bass — sine on top of a triangle sub, full sustain, just enough cutoff to keep it warm. Dry."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false

[performance.upper]
osc1_wave = "Sine"
osc1_level = 0.8
osc2_wave = "Triangle"
osc2_level = 0.7
sub_level = 0.55
cutoff = 800.0
resonance = 0.15
env2_attack = 0.005
env2_sustain = 0.95
env2_release = 0.2
assign_mode = "Solo"
