schema = 1

[meta]
name = "Mini Bass"
author = "Vulpus Labs"
category = "Bass"
comment = "Mini-Moog three-oscillator-ish: two saws + sub, ladder-style snap, full key-track. Dry."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false

[performance.upper]
osc1_level = 0.9
osc2_octave = 0
osc2_fine = -7.0
osc2_level = 0.7
sub_level = 0.55
cutoff = 35.0
resonance = 0.45
drive = 1.6
filter_key_track = 1.0
env1_decay = 0.35
env1_sustain = 0.1
cutoff_env_depth = 60.0
env2_attack = 0.002
env2_decay = 0.5
env2_sustain = 0.4
env2_release = 0.12
assign_mode = "Solo"
legato = true
portamento_time = 0.04
