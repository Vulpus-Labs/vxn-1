schema = 1

[meta]
name = "Boofy Bass"
author = "Vulpus Labs"
category = "Bass"
comment = "Round, bottom-heavy bass — two saws with a fat sub, fast filter snap, Solo with a touch of glide. Dry."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false

[performance.upper]
osc1_level = 0.8
osc2_octave = 0
osc2_fine = 6.0
osc2_level = 0.7
sub_level = 0.65
cutoff = 50.0
resonance = 0.45
drive = 1.5
filter_key_track = 0.7
env1_decay = 0.4
cutoff_env_depth = 60.0
env2_attack = 0.003
env2_decay = 0.55
env2_sustain = 0.5
env2_release = 0.15
assign_mode = "Solo"
legato = true
portamento_time = 0.04
