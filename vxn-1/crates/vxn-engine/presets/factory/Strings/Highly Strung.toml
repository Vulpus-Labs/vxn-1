schema = 1

[meta]
name = "Highly Strung"
author = "Vulpus Labs"
category = "Strings"
comment = "Bright unison strings — eight detuned saws, slow bow-swell, high register. Chorus and a touch of small-room reverb."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
master_drift = 0.15
chorus_rate = 0.55
chorus_depth = 0.7
chorus_mix = 0.5
reverb_on = true
reverb_size = 0.4
reverb_decay = 1.8
reverb_damp = 0.45
reverb_mix = 0.18

[performance.upper]
osc2_octave = 0
osc2_fine = 9.0
osc2_level = 0.8
cutoff = 3600.0
resonance = 0.15
filter_key_track = 0.4
env1_attack = 0.3
env1_decay = 0.9
env1_sustain = 0.5
env1_release = 0.9
cutoff_env_depth = 14.0
env2_attack = 0.5
env2_decay = 2.0
env2_sustain = 0.85
env2_release = 1.1
assign_mode = "Unison"
unison_detune = 16.0
pitch_lfo_depth = 0.2
lfo_rate = 4.5
lfo1_free_run = true
