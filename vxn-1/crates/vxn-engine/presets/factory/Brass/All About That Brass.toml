schema = 1

[meta]
name = "All About That Brass"
author = "Vulpus Labs"
category = "Brass"
comment = "Classic JP-8 brass stab — pulse-and-saw with slow PWM shimmer, Env 1 filter bite, polished by chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_rate = 0.5
chorus_depth = 0.55
chorus_mix = 0.45

[performance.upper]
osc1_wave = "Pulse"
osc1_pw = 0.45
osc2_octave = 0
osc2_fine = -3.0
osc2_level = 0.75
cutoff = 1500.0
resonance = 0.18
filter_key_track = 0.55
env1_decay = 0.3
env1_sustain = 0.3
cutoff_env_depth = 36.0
env2_attack = 0.02
env2_sustain = 0.75
env2_release = 0.3
pwm_lfo_src = "LFO 1"
pwm_lfo_depth = 0.08
lfo_rate = 0.7
