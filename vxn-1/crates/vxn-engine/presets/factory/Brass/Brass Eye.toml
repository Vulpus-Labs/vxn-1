schema = 1

[meta]
name = "Brass Eye"
author = "Vulpus Labs"
category = "Brass"
comment = "Low brass — tubas and trombones, a saw pair down low, the slow phaser sweep is the eye looking back. No chorus."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
phaser_on = true
phaser_rate = 0.2
phaser_depth = 0.75
phaser_fb = 0.45
phaser_mix = 0.55

[performance.upper]
osc1_octave = -1
osc1_level = 0.8
osc2_fine = -4.0
osc2_level = 0.8
cutoff = 480.0
resonance = 0.25
drive = 1.4
filter_key_track = 0.5
env1_decay = 0.5
env1_sustain = 0.2
cutoff_env_depth = 48.0
env2_attack = 0.03
env2_sustain = 0.78
env2_release = 0.35
