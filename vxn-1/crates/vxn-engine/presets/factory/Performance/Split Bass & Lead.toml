schema = 1

[meta]
name = "Split Bass & Lead"
author = "Vulpus Labs"
category = "Performance"
comment = "Keyboard split at C3 (MIDI 48): Solo mono lead Upper, Solo bass Lower. Dry on both sides — let the playing speak."

[performance]
key_mode = "Split"
split_point = 48

[performance.global]
chorus_on = false
master_volume = 0.75

[performance.upper]
osc1_level = 0.85
osc2_wave = "Pulse"
osc2_octave = 0
osc2_pw = 0.45
osc2_fine = 7.0
osc2_level = 0.7
cutoff = 3500.0
resonance = 0.25
drive = 1.3
env1_decay = 0.4
env1_sustain = 0.4
cutoff_env_depth = 24.0
env2_attack = 0.005
env2_decay = 0.4
env2_sustain = 0.85
env2_release = 0.3
assign_mode = "Solo"
legato = true
portamento_time = 0.03
pitch_wheel_depth = 7.0

[performance.lower]
osc1_level = 0.85
osc2_octave = 0
osc2_fine = -6.0
osc2_level = 0.7
sub_level = 0.5
cutoff = 45.0
resonance = 0.5
drive = 1.6
filter_key_track = 0.7
env1_decay = 0.3
cutoff_env_depth = 60.0
env2_attack = 0.002
env2_decay = 0.4
env2_sustain = 0.5
env2_release = 0.15
assign_mode = "Solo"
legato = true
