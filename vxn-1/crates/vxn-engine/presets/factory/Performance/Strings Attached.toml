schema = 1

[meta]
name = "Strings Attached"
author = "Vulpus Labs"
category = "Performance"
comment = "Orchestral stack as Dual — bright brass (Upper) layered over unison strings (Lower), so every note sounds both. Chorus widens the strings, medium hall behind."

[performance]
key_mode = "Dual"
split_point = 60

[performance.global]
master_volume = 0.6
master_drift = 0.2
chorus_rate = 0.55
chorus_depth = 0.7
chorus_mix = 0.5
reverb_on = true
reverb_size = 0.55
reverb_decay = 2.8
reverb_damp = 0.4
reverb_mix = 0.25

[performance.upper]
osc2_octave = 0
osc2_fine = -4.0
osc2_level = 0.8
cutoff = 1300.0
resonance = 0.2
drive = 1.4
env1_decay = 0.3
env1_sustain = 0.2
cutoff_env_depth = 42.0
env2_attack = 0.015
env2_sustain = 0.75
env2_release = 0.3
layer_level = 0.85

[performance.lower]
osc2_octave = 0
osc2_fine = 9.0
osc2_level = 0.8
cutoff = 3000.0
resonance = 0.15
env1_attack = 0.5
env1_decay = 1.2
env1_sustain = 0.5
env1_release = 1.0
cutoff_env_depth = 14.0
env2_attack = 0.5
env2_decay = 2.0
env2_sustain = 0.85
env2_release = 1.3
assign_mode = "Unison"
unison_detune = 16.0
pitch_lfo_depth = 0.18
lfo_rate = 4.5
lfo1_free_run = true
