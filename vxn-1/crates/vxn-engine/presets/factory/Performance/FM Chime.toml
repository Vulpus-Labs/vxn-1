schema = 1

[meta]
name = "FM Chime"
author = "Vulpus Labs"
category = "Performance"
comment = "Two-layer Dual: Upper is a static FM bell (sine carrier + sine modulator at +7 st), Lower is a sine 'ting' with an inverted Env-1 pitch ping. Delay + hall behind it. 4x oversample for clean FM."

[performance]
key_mode = "Dual"
split_point = 60

[performance.global]
chorus_on = false
oversample = "4x"
delay_on = true
delay_time = 0.32
delay_feedback = 0.5
delay_mix = 0.25
reverb_on = true
reverb_size = 0.65
reverb_decay = 4.0
reverb_damp = 0.4
reverb_mix = 0.3

[performance.upper]
osc1_wave = "Sine"
osc2_wave = "Sine"
osc2_coarse = 7
osc2_octave = 0
osc2_level = 0.0
cross_mod_type = "FM"
cross_mod_amount = 1.3
cutoff = 9000.0
resonance = 0.1
env2_attack = 0.001
env2_decay = 2.5
env2_sustain = 0.0
env2_release = 0.8

[performance.lower]
osc1_wave = "Sine"
osc2_octave = 0
osc2_level = 0.0
cutoff = 12000.0
resonance = 0.0
pitch_env_src = "Env 1"
pitch_env_depth = -7.0
env1_attack = 0.001
env1_decay = 0.15
env2_attack = 0.001
env2_decay = 0.5
env2_sustain = 0.0
env2_release = 0.3
layer_level = 0.6
