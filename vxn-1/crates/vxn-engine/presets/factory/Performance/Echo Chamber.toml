schema = 1

[meta]
name = "Echo Chamber"
author = "Vulpus Labs"
category = "Performance"
comment = "Tine FM electric piano in a long echo space — heavy ping-pong-ish delay plus medium hall. Chorus off."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
delay_on = true
delay_time = 0.36
delay_feedback = 0.55
delay_mix = 0.38
reverb_on = true
reverb_size = 0.55
reverb_decay = 2.8
reverb_damp = 0.45
reverb_mix = 0.28

[performance.upper]
osc1_wave = "Sine"
osc1_level = 0.9
osc2_wave = "Sine"
osc2_octave = 0
osc2_level = 0.0
cross_mod_type = "FM"
cross_mod_amount = 1.0
cutoff = 7000.0
env2_attack = 0.002
env2_decay = 1.2
env2_sustain = 0.0
env2_release = 0.4
