schema = 1

[meta]
name = "Echo Chamber"
author = "Vulpus Labs"
category = "Performance"
comment = "Tine-y FM electric piano with a slapback echo via the global delay. Chorus off."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
delay_on = true
delay_time = 0.22
delay_feedback = 0.25
delay_mix = 0.35

[performance.upper]
osc1_wave = "Sine"
osc2_wave = "Sine"
osc2_octave = 0
osc2_fine = 0.0
osc2_level = 0.0
cross_mod_type = "FM"
cross_mod_amount = 1.0
cutoff = 7000.0
env2_attack = 0.002
env2_decay = 1.2
env2_sustain = 0.0
env2_release = 0.4
