schema = 1

[meta]
name = "Combo Organ"
author = "Vulpus Labs"
category = "Jovian Organ"
comment = "JP-8 ROM patch 43 \"Combo Organ\" — transliterated to VXN-1 from the TAL J-8 community port of the Roland factory sheets. No FX (JP-8 had none)."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false

[performance.upper]
osc1_wave = "Triangle"
osc2_wave = "Triangle"
osc2_octave = 1
osc2_fine = 7.3
osc2_level = 0.8
cutoff = 30.0
resonance = 0.0
filter_key_track = 1.0
cutoff_env_depth = 48.0
env1_attack = 0.001
env1_decay = 0.001
env1_release = 0.001
env2_attack = 0.001
env2_decay = 10.0
env2_sustain = 1.0
env2_release = 0.001
lfo_rate = 2.14
lfo1_delay_time = 2.28
