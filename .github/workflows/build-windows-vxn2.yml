name: Build Windows (vxn-2)

# Build VXN2.clap on Windows — mirrors the vxn-1 Windows job in bundle.yml.
# Runs on push to main and on workflow_dispatch; uploads VXN2-windows-x64.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-windows-vxn2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows (x86_64 — CLAP)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # Ticket 0023 acceptance #2: the host-agnostic vxn-2 crates' tests must
      # pass on Windows. These crates carry no platform cfg (vxn2-engine's
      # per-OS preset dir is fully gated), so the suite is platform-independent.
      - name: Test host-agnostic vxn-2 crates
        run: cargo test --release -p vxn2-dsp -p vxn2-app -p vxn2-engine -p vxn2-osc-bench

      - name: Build VXN2.clap
        working-directory: vxn-2
        run: cargo xtask bundle --release

      - name: Upload VXN2-windows-x64
        uses: actions/upload-artifact@v4
        with:
          name: VXN2-windows-x64
          path: target/bundled/VXN2.clap
          if-no-files-found: error
