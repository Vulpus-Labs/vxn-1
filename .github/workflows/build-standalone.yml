name: Build Standalone

# Build standalone apps (VXN1.app/VXN1.exe, VXN2.app/VXN2.exe) via the
# clap-wrapper standalone target. Requires CMake + C++ toolchain + submodules.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-standalone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (universal — VXN1 + VXN2)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Ninja
        run: brew install ninja

      - name: Build VXN1 standalone
        working-directory: vxn-1
        run: cargo xtask standalone --release --universal

      - name: Build VXN2 standalone
        working-directory: vxn-2
        run: cargo xtask standalone --release

      - name: Upload VXN1 standalone
        uses: actions/upload-artifact@v4
        with:
          name: vxn1-standalone-macOS
          path: target/bundled/VXN1.app
          if-no-files-found: error

      - name: Upload VXN2 standalone
        uses: actions/upload-artifact@v4
        with:
          name: vxn2-standalone-macOS
          path: target/bundled/VXN2.app
          if-no-files-found: error

  windows:
    name: Windows (x86_64 — VXN1 + VXN2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Build VXN1 standalone
        working-directory: vxn-1
        run: cargo xtask standalone --release

      - name: Build VXN2 standalone
        working-directory: vxn-2
        run: cargo xtask standalone --release

      - name: Upload VXN1 standalone
        uses: actions/upload-artifact@v4
        with:
          name: VXN1-windows-x64-standalone
          path: target/bundled/VXN1.exe
          if-no-files-found: error

      - name: Upload VXN2 standalone
        uses: actions/upload-artifact@v4
        with:
          name: VXN2-windows-x64-standalone
          path: target/bundled/VXN2.exe
          if-no-files-found: error
