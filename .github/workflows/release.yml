name: Release

# Build the CLAP plugin for macOS and Windows and attach the binaries to the
# GitHub Release that triggered the run.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos:
    name: macOS (universal)
    runs-on: macos-14
    steps:
      # Submodules (clap-wrapper + vst3sdk) are needed for the VST3 build.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Ninja
        run: brew install ninja

      - name: Build universal CLAP + VST3 bundles
        working-directory: vxn-1
        run: cargo xtask bundle --release --format clap,vst3 --universal

      # The macOS .clap/.vst3 are bundle directories; ditto zips them preserving
      # the bundle structure (and resource forks) so they unpack cleanly.
      - name: Zip bundles
        run: |
          ditto -c -k --keepParent target/bundled/VXN1.clap VXN1-macOS-universal.clap.zip
          ditto -c -k --keepParent target/bundled/VXN1.vst3 VXN1-macOS-universal.vst3.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VXN1-macOS-universal.clap.zip
            VXN1-macOS-universal.vst3.zip

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Build CLAP + VST3 bundles
        working-directory: vxn-1
        run: cargo xtask bundle --release --format clap,vst3

      # On Windows the .clap is a single shared library; the .vst3 is a folder
      # bundle. Rename the CLAP and zip the VST3 bundle for upload.
      - name: Package artifacts
        run: |
          Copy-Item target/bundled/VXN1.clap VXN1-windows-x64.clap
          Compress-Archive -Path target/bundled/VXN1.vst3 -DestinationPath VXN1-windows-x64.vst3.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VXN1-windows-x64.clap
            VXN1-windows-x64.vst3.zip

  macos-vxn2:
    name: macOS vxn-2 (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build universal VXN2 CLAP
        working-directory: vxn-2
        run: cargo xtask bundle --release --universal

      - name: Zip bundle
        run: ditto -c -k --keepParent target/bundled/VXN2.clap VXN2-macOS-universal.clap.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: VXN2-macOS-universal.clap.zip

  windows-vxn2:
    name: Windows vxn-2 (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build VXN2 CLAP
        working-directory: vxn-2
        run: cargo xtask bundle --release

      - name: Package artifact
        run: Copy-Item target/bundled/VXN2.clap VXN2-windows-x64.clap

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: VXN2-windows-x64.clap

  manual:
    name: Manual (PDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook and mdbook-pandoc
        run: cargo install mdbook mdbook-pandoc --locked

      - name: Install Pandoc
        run: |
          curl -sSL https://github.com/jgm/pandoc/releases/download/3.2/pandoc-3.2-linux-amd64.tar.gz \
            | tar -xz --strip-components=2 --directory /usr/local/bin pandoc-3.2/bin/pandoc

      - name: Install Tectonic
        run: |
          curl -sSL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --directory /usr/local/bin

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Write puppeteer config (no-sandbox for CI chromium)
        run: |
          cat > /tmp/puppeteer-config.json <<'EOF'
          { "args": ["--no-sandbox"] }
          EOF

      - name: Render diagrams
        working-directory: vxn-1/docs
        env:
          MMDC_PUPPETEER_CONFIG: /tmp/puppeteer-config.json
        run: ./render-diagrams.sh

      - name: Build manual
        working-directory: vxn-1/docs
        run: mdbook build

      - name: Attach PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: vxn-1/docs/book/pandoc/pdf/vxn1-manual.pdf
