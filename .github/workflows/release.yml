name: Release

# Build the CLAP plugin for macOS and Windows and attach the binaries to the
# GitHub Release that triggered the run.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos:
    name: macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build universal CLAP bundle
        working-directory: vxn-1
        run: cargo xtask bundle --release --universal

      # The macOS .clap is a bundle directory; ditto zips it preserving the
      # bundle structure (and resource forks) so it unpacks cleanly.
      - name: Zip bundle
        run: ditto -c -k --keepParent target/bundled/VXN1.clap VXN1-macOS-universal.clap.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: VXN1-macOS-universal.clap.zip

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build CLAP bundle
        working-directory: vxn-1
        run: cargo xtask bundle --release

      # On Windows the .clap is a single shared library; rename for clarity and
      # upload it directly.
      - name: Rename artifact
        run: Copy-Item target/bundled/VXN1.clap VXN1-windows-x64.clap

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: VXN1-windows-x64.clap

  manual:
    name: Manual (PDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook and mdbook-pandoc
        run: cargo install mdbook mdbook-pandoc --locked

      - name: Install Pandoc
        run: |
          curl -sSL https://github.com/jgm/pandoc/releases/download/3.2/pandoc-3.2-linux-amd64.tar.gz \
            | tar -xz --strip-components=2 --directory /usr/local/bin pandoc-3.2/bin/pandoc

      - name: Install Tectonic
        run: |
          curl -sSL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build manual
        working-directory: vxn-1/docs
        run: mdbook build

      - name: Attach PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: vxn-1/docs/book/pandoc/pdf/vxn1-manual.pdf
