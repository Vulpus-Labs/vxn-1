name: Docs

on:
  push:
    branches: [main]
    paths:
      - "vxn-1/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook, mdbook-pandoc and mdbook-mermaid
        run: cargo install mdbook mdbook-pandoc mdbook-mermaid --locked

      - name: Install Pandoc
        run: |
          curl -sSL https://github.com/jgm/pandoc/releases/download/3.2/pandoc-3.2-linux-amd64.tar.gz \
            | tar -xz --strip-components=2 --directory /usr/local/bin pandoc-3.2/bin/pandoc

      - name: Install Tectonic
        run: |
          curl -sSL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build docs (HTML + PDF)
        working-directory: vxn-1/docs
        run: mdbook build

      - name: Upload HTML for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: vxn-1/docs/book/html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: vxn1-manual-pdf
          path: vxn-1/docs/book/pandoc/pdf/vxn1-manual.pdf
          if-no-files-found: warn

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
