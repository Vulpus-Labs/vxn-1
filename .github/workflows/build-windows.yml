name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vxn-1

      - name: Build CLAP bundle
        working-directory: vxn-1
        run: cargo xtask bundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: VXN1-windows-x64
          path: vxn-1/target/bundled/VXN1.clap
          if-no-files-found: error
