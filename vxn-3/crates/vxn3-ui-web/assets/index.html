<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VXN3</title>
  <style>__CSS__</style>
</head>
<body>
  <header class="topbar">
    <span class="logo">VXN3</span>
    <span class="tagline">synthesis drum machine</span>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="pattern">Pattern</button>
      <button class="tab" data-tab="voices">Voices</button>
    </nav>
    <span id="transport" class="transport">■ stopped</span>
  </header>

  <section id="tab-pattern" class="tabview">
    <main id="rack"></main>
    <footer id="master" class="master"></footer>
  </section>

  <section id="tab-voices" class="tabview hidden">
    <div class="voices-pane">
      <aside id="voice-list" class="voice-list"></aside>
      <div id="voice-editor" class="voice-editor"></div>
    </div>
  </section>

  <div id="voice-browser" class="browser hidden" aria-label="voice browser"></div>

  <script>
    window.__VXN3_CONFIG__ = __CONFIG_JSON__;
  </script>
  <script>__APP_JS__</script>
</body>
</html>
