schema = 1

[meta]
name = "Vox Populi"
author = "Vulpus Labs"
category = "Pad"
comment = "Synthetic choir 'aah' — twin pulse oscillators through a bandpass for a vowel-like formant, slow swell and a breath of vibrato."

[performance]
key_mode = "Whole"
split_point = 60

[performance.upper]
osc1_wave = "Pulse"
osc1_pw = 0.3
osc2_wave = "Pulse"
osc2_octave = 0
osc2_pw = 0.4
osc2_fine = 6.0
filter_mode = "BP"
cutoff = 1200.0
resonance = 0.3
env2_attack = 0.45
env2_decay = 1.5
env2_sustain = 0.85
env2_release = 1.0
pitch_lfo_depth = 0.25
