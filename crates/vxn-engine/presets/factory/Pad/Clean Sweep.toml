schema = 1

[meta]
name = "Clean Sweep"
author = "Vulpus Labs"
category = "Pad"
comment = "Heavy sync-sweep pad — Env 1 drags osc 2's pitch under hard sync for a slow, glassy formant motion. Raise the global Oversample for the cleanest sync."

