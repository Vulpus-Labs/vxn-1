cross_mod_type = "Sync"
osc2_pitch_env_src = "Env 1"
osc2_pitch_env_depth = 30.0
env1_attack = 0.6
env1_decay = 2.5
cutoff = 5000.0
resonance = 0.2
env2_attack = 0.5
env2_decay = 1.5
env2_sustain = 0.7
env2_release = 1.4
