schema = 1

[meta]
name = "Sync or Swim"
author = "Vulpus Labs"
category = "Lead"
comment = "Surging negative-envelope sync lead — sharp attack, the sync sweep diving downward via an inverted (negative) pitch-env depth. Raise Oversample for clean sync."

[performance]
