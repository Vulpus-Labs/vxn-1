env1_decay = 0.25
cutoff = 5500.0
resonance = 0.25
drive = 1.5
env2_attack = 0.002
env2_decay = 0.4
env2_sustain = 0.7
env2_release = 0.2
assign_mode = "Solo"
legato = true
